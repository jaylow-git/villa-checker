name: Villa Park daily check

on:
  schedule:
    # Several attempts across the morning because GitHub's cron is best-effort:
    # firings can be hours late or dropped entirely. The gate step below runs
    # the check on the FIRST firing that lands after 06:45 UK, and skips the
    # rest (it reads the last-check date from docs/events.json). Minute :50
    # avoids the top-of-the-hour congestion that causes the worst delays.
    # BST: 06:50/07:50/08:50/09:50 UK; GMT: 05:50 (gated off)/06:50/07:50/08:50.
    # NOTE: after editing these cron entries, commit this file once more —
    # GitHub sometimes fails to register a changed schedule until the
    # workflow file changes again.
    - cron: '50 5 * * *'
    - cron: '50 6 * * *'
    - cron: '50 7 * * *'
    - cron: '50 8 * * *'
  workflow_dispatch:
    inputs:
      send_notification:
        description: Send the ntfy notification (untick to only refresh events.json)
        type: boolean
        default: true
      force:
        description: Run even if today's check already happened
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: villa-park-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Gate on first firing after 06:45 UK
        id: gate
        run: |
          # Manual runs with the force box ticked always go ahead; everything
          # else (schedule firings AND external workflow_dispatch triggers,
          # e.g. cron-job.org) goes through the once-per-day gate below so
          # multiple triggers can coexist without double notifications.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ "${{ inputs.force }}" = "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 - "$GITHUB_OUTPUT" <<'PYEOF'
          import json
          import sys
          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo

          london = ZoneInfo("Europe/London")
          now = datetime.now(london)
          run = True
          if (now.hour, now.minute) < (6, 45):
              print(f"Skipping: {now:%H:%M} UK is before the morning window opens at 06:45.")
              run = False
          else:
              try:
                  with open("docs/events.json", encoding="utf-8") as fh:
                      updated_utc = json.load(fh)["updated_utc"]
                  last = datetime.strptime(updated_utc, "%Y-%m-%dT%H:%M:%SZ").replace(
                      tzinfo=timezone.utc
                  ).astimezone(london)
                  if last.date() == now.date():
                      print(f"Skipping: already checked today at {last:%H:%M} UK.")
                      run = False
              except Exception as exc:  # missing/corrupt file: run rather than miss a day
                  print(f"Couldn't read the last-check time ({exc}); running anyway.")
          with open(sys.argv[1], "a", encoding="utf-8") as out:
              out.write(f"run={'true' if run else 'false'}\n")
          PYEOF

      - name: Set up Python
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Check events and notify
        if: steps.gate.outputs.run == 'true'
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ "${{ inputs.send_notification }}" = "false" ]; then
            python scripts/check_events.py --no-notify
          else
            python scripts/check_events.py
          fi

      - name: Commit updated events.json
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/events.json
          if git diff --cached --quiet; then
            echo "events.json unchanged, nothing to commit."
          else
            git commit -m "Update Villa Park events data"
            git pull --rebase origin "$GITHUB_REF_NAME"
            git push origin "HEAD:$GITHUB_REF_NAME"
          fi
