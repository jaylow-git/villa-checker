<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Villa Park — upcoming events</title>
<style>
  :root {
    --claret: #670e36;
    --blue: #95bfe5;
    --bg: #f7f5f6;
    --card: #ffffff;
    --text: #22161c;
    --muted: #6b5a62;
    --border: #e4dbdf;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #17121a;
      --card: #221a26;
      --text: #f0e9ed;
      --muted: #a394a0;
      --border: #3a2f3e;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: var(--claret);
    color: #fff;
    padding: 1.25rem 1rem;
    border-bottom: 4px solid var(--blue);
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 0 1rem; }
  header .wrap { padding: 0; max-width: 640px; margin: 0 auto; padding: 0 1rem; }
  h1 { margin: 0; font-size: 1.35rem; }
  header p { margin: .25rem 0 0; opacity: .85; font-size: .9rem; }
  main { max-width: 640px; margin: 1.25rem auto 3rem; padding: 0 1rem; }
  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap;
  }
  #updated { color: var(--muted); font-size: .85rem; }
  button {
    background: var(--claret); color: #fff; border: 0;
    padding: .55rem 1.1rem; border-radius: .5rem;
    font-size: .95rem; cursor: pointer;
  }
  button:hover { filter: brightness(1.15); }
  button:disabled { opacity: .6; cursor: wait; }
  ul { list-style: none; margin: 0; padding: 0; display: grid; gap: .75rem; }
  li.event {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 5px solid var(--blue);
    border-radius: .6rem;
    padding: .85rem 1rem;
  }
  li.event.today { border-left-color: var(--claret); }
  .event-name { font-weight: 600; }
  .event-when { color: var(--muted); font-size: .9rem; margin-top: .2rem; }
  .badge {
    display: inline-block; background: var(--claret); color: #fff;
    font-size: .7rem; font-weight: 700; letter-spacing: .05em;
    padding: .15rem .5rem; border-radius: 99px; margin-left: .5rem;
    vertical-align: middle;
  }
  .empty, .error {
    background: var(--card); border: 1px dashed var(--border);
    border-radius: .6rem; padding: 1.25rem; text-align: center;
    color: var(--muted);
  }
  .warnings { color: var(--muted); font-size: .8rem; margin-top: 1rem; }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>Villa Wankers</h1>
    <p>Here's the next 5 times drunk arseholes will piss on the side of our house.</p>
  </div>
</header>
<main>
  <div class="toolbar">
    <span id="updated">Loading…</span>
    <button id="refresh" type="button">Refresh</button>
  </div>
  <ul id="events"></ul>
  <div id="message"></div>
  <p class="warnings" id="warnings"></p>
</main>
<script>
  const list = document.getElementById('events');
  const message = document.getElementById('message');
  const updated = document.getElementById('updated');
  const warningsEl = document.getElementById('warnings');
  const button = document.getElementById('refresh');

  async function load() {
    button.disabled = true;
    button.textContent = 'Refreshing…';
    message.innerHTML = '';
    try {
      // Cache-buster so "Refresh" always fetches the latest committed data.
      const resp = await fetch('events.json?t=' + Date.now(), { cache: 'no-store' });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();

      updated.textContent = data.updated_local
        ? 'Last checked: ' + data.updated_local
        : 'No data yet — run the workflow once.';

      list.innerHTML = '';
      if (!data.events || data.events.length === 0) {
        message.innerHTML = '<div class="empty">No upcoming events found at Villa Park.</div>';
      } else {
        for (const ev of data.events) {
          const li = document.createElement('li');
          li.className = 'event' + (ev.today ? ' today' : '');
          const name = document.createElement('div');
          name.className = 'event-name';
          name.textContent = ev.name;
          if (ev.today) {
            const badge = document.createElement('span');
            badge.className = 'badge';
            badge.textContent = 'TODAY';
            name.appendChild(badge);
          }
          const when = document.createElement('div');
          when.className = 'event-when';
          when.textContent = ev.date_pretty + ' · ' +
            (ev.time_local === 'TBC' ? 'time TBC' : ev.time_local + ' UK time');
          li.append(name, when);
          list.appendChild(li);
        }
      }
      warningsEl.textContent = (data.warnings && data.warnings.length)
        ? 'Note: ' + data.warnings.join('; ') : '';
    } catch (err) {
      updated.textContent = '';
      message.innerHTML = '<div class="error">Couldn’t load event data (' +
        err.message + '). Try refreshing.</div>';
    } finally {
      button.disabled = false;
      button.textContent = 'Refresh';
    }
  }

  button.addEventListener('click', load);
  load();
</script>
</body>
</html>
